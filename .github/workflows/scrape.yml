name: Scrape Richland County Leads

on:
  schedule:
    # Run every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back (default: 7)"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape & Publish Leads
    runs-on: ubuntu-22.04

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Install Playwright + Chromium
        run: python -m playwright install --with-deps chromium

      # ── Create output directories ──────────────────────────────────────────
      - name: Ensure output directories exist
        run: |
          mkdir -p dashboard
          mkdir -p data

      # ── Run scraper ─────────────────────────────────────────────────────────
      - name: Run scraper
        env:
          LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}
        run: python scraper/fetch.py

      # ── Commit updated records ──────────────────────────────────────────────
      - name: Commit & push updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/leads_ghl_export.csv || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

  # ── Deploy dashboard to GitHub Pages ─────────────────────────────────────
  deploy-pages:
    name: Deploy Dashboard to GitHub Pages
    needs: scrape
    runs-on: ubuntu-22.04

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # always deploy latest after scrape push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
